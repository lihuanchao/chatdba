services:
  api:
    image: chatdba:prod
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.prod
    ports:
      - "${CHATDBA_API_PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    command:
      - uvicorn
      - chatdba.app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"

  dingtalk:
    image: chatdba:prod
    env_file:
      - .env.prod
    restart: unless-stopped
    command: ["chatdba-dingtalk"]

  alarm-binlog:
    image: chatdba:prod
    env_file:
      - .env.prod
    volumes:
      - ./data:/data/chatdba
    restart: unless-stopped
    command: ["chatdba-alarm-binlog"]
